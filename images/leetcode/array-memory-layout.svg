<svg width="960" height="292" viewBox="0 0 960 292" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">数组内存布局示意图</title>
  <desc id="desc">字符数组 SABJHJAB 连续存放在地址 100 到 107，上方是内存地址，下方是下标 0 到 7。</desc>
  <style>
    .shell { fill: #F8FAFC; stroke: #E2E8F0; }
    .label { fill: #475569; font: 600 18px Arial, sans-serif; }
    .addr { fill: #64748B; font: 600 18px Arial, sans-serif; }
    .index { fill: #64748B; font: 600 18px Arial, sans-serif; }
    .cell { fill: #FFFFFF; stroke: #CBD5E1; }
    .value { fill: #0F172A; font: 600 28px Arial, sans-serif; }
    .accent { fill: #DCFCE7; stroke: #16A34A; }
    .accent-text { fill: #166534; font: 700 14px Arial, sans-serif; }
    .grid-line { stroke: #E2E8F0; }
    @media (prefers-color-scheme: dark) {
      .shell { fill: #0F1115; stroke: #2A2A30; }
      .label { fill: #A1A1AA; }
      .addr { fill: #A1A1AA; }
      .index { fill: #A1A1AA; }
      .cell { fill: #16181D; stroke: #2A2A30; }
      .value { fill: #F9FAFB; }
      .accent { fill: #0F2E1B; stroke: #16A34A; }
      .accent-text { fill: #4ADE80; }
      .grid-line { stroke: #2A2A30; }
    }
  </style>

  <rect class="shell" x="12" y="12" width="936" height="268" rx="24" stroke-width="1.5"/>

  <rect class="accent" x="42" y="58" width="104" height="34" rx="17" stroke-width="1.5"/>
  <text class="accent-text" x="94" y="79" text-anchor="middle">连续存储</text>

  <text class="label" x="44" y="122" dominant-baseline="middle">内存地址：</text>
  <text class="label" x="44" y="166" dominant-baseline="middle">字符数组：</text>
  <text class="label" x="44" y="222" dominant-baseline="middle">下标：</text>

  <line class="grid-line" x1="198" y1="140" x2="900" y2="140" stroke-width="1.2"/>

  <g>
    <text class="addr" x="236" y="122" text-anchor="middle" dominant-baseline="middle">100</text>
    <rect class="cell" x="198" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="237" y="186" text-anchor="middle" dominant-baseline="middle">S</text>
    <text class="index" x="237" y="222" text-anchor="middle" dominant-baseline="middle">0</text>
  </g>
  <g>
    <text class="addr" x="318" y="122" text-anchor="middle" dominant-baseline="middle">101</text>
    <rect class="cell" x="280" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="319" y="186" text-anchor="middle" dominant-baseline="middle">A</text>
    <text class="index" x="319" y="222" text-anchor="middle" dominant-baseline="middle">1</text>
  </g>
  <g>
    <text class="addr" x="400" y="122" text-anchor="middle" dominant-baseline="middle">102</text>
    <rect class="cell" x="362" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="401" y="186" text-anchor="middle" dominant-baseline="middle">B</text>
    <text class="index" x="401" y="222" text-anchor="middle" dominant-baseline="middle">2</text>
  </g>
  <g>
    <text class="addr" x="482" y="122" text-anchor="middle" dominant-baseline="middle">103</text>
    <rect class="cell" x="444" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="483" y="186" text-anchor="middle" dominant-baseline="middle">J</text>
    <text class="index" x="483" y="222" text-anchor="middle" dominant-baseline="middle">3</text>
  </g>
  <g>
    <text class="addr" x="564" y="122" text-anchor="middle" dominant-baseline="middle">104</text>
    <rect class="cell" x="526" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="565" y="186" text-anchor="middle" dominant-baseline="middle">H</text>
    <text class="index" x="565" y="222" text-anchor="middle" dominant-baseline="middle">4</text>
  </g>
  <g>
    <text class="addr" x="646" y="122" text-anchor="middle" dominant-baseline="middle">105</text>
    <rect class="cell" x="608" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="647" y="186" text-anchor="middle" dominant-baseline="middle">J</text>
    <text class="index" x="647" y="222" text-anchor="middle" dominant-baseline="middle">5</text>
  </g>
  <g>
    <text class="addr" x="728" y="122" text-anchor="middle" dominant-baseline="middle">106</text>
    <rect class="cell" x="690" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="729" y="186" text-anchor="middle" dominant-baseline="middle">A</text>
    <text class="index" x="729" y="222" text-anchor="middle" dominant-baseline="middle">6</text>
  </g>
  <g>
    <text class="addr" x="810" y="122" text-anchor="middle" dominant-baseline="middle">107</text>
    <rect class="cell" x="772" y="146" width="78" height="74" rx="14" stroke-width="1.5"/>
    <text class="value" x="811" y="186" text-anchor="middle" dominant-baseline="middle">B</text>
    <text class="index" x="811" y="222" text-anchor="middle" dominant-baseline="middle">7</text>
  </g>
</svg>
