<svg width="960" height="248" viewBox="0 0 960 248" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">单链表结构示意图</title>
  <desc id="desc">head 指向第一个节点，节点 A、C、D、E 通过 next 指针依次连接，最后指向 null。</desc>
  <style>
    .shell { fill: #F8FAFC; stroke: #E2E8F0; }
    .panel { fill: #FFFFFF; stroke: #CBD5E1; }
    .divider { stroke: #E2E8F0; }
    .label { fill: #0F172A; font: 700 18px Arial, sans-serif; }
    .value { fill: #0F172A; font: 600 30px Arial, sans-serif; }
    .muted { fill: #475569; font: 600 15px Arial, sans-serif; }
    .chip-text { fill: #0F172A; font: 700 15px Arial, sans-serif; }
    .line { stroke: #94A3B8; stroke-width: 3; }
    .accent { fill: #DCFCE7; stroke: #16A34A; }
    .accent-text { fill: #166534; font: 700 16px Arial, sans-serif; }
    .danger { fill: #FEF2F2; stroke: #EF4444; }
    .danger-text { fill: #DC2626; font: 700 16px Arial, sans-serif; }
    .pointer { fill: #16A34A; }
    .legend-dot { fill: #16A34A; }
    @media (prefers-color-scheme: dark) {
      .shell { fill: #0F1115; stroke: #2A2A30; }
      .panel { fill: #16181D; stroke: #2A2A30; }
      .divider { stroke: #2A2A30; }
      .label { fill: #F3F4F6; }
      .value { fill: #F9FAFB; }
      .muted { fill: #A1A1AA; }
      .chip-text { fill: #E5E7EB; }
      .line { stroke: #8B8F97; }
      .accent { fill: #0F2E1B; stroke: #16A34A; }
      .accent-text { fill: #4ADE80; }
      .danger { fill: #311314; stroke: #EF4444; }
      .danger-text { fill: #F87171; }
      .pointer { fill: #22C55E; }
      .legend-dot { fill: #22C55E; }
    }
  </style>

  <rect class="shell" x="12" y="12" width="936" height="224" rx="24" stroke-width="1.5"/>

  <rect class="accent" x="34" y="92" width="72" height="36" rx="18" stroke-width="1.5"/>
  <text class="accent-text" x="70" y="114" text-anchor="middle">head</text>
  <line class="line" x1="106" y1="110" x2="148" y2="110"/>
  <path d="M148 110L138 104V116L148 110Z" fill="#16A34A"/>

  <g>
    <rect class="panel" x="160" y="72" width="140" height="76" rx="18" stroke-width="1.5"/>
    <line class="divider" x1="252" y1="72" x2="252" y2="148" stroke-width="1.5"/>
    <text class="muted" x="206" y="95" text-anchor="middle">data</text>
    <text class="muted" x="276" y="95" text-anchor="middle">next</text>
    <text class="value" x="206" y="125" text-anchor="middle">A</text>
    <circle class="pointer" cx="276" cy="110" r="7"/>
  </g>

  <line class="line" x1="283" y1="110" x2="332" y2="110"/>
  <path d="M332 110L322 104V116L332 110Z" fill="#94A3B8"/>

  <g>
    <rect class="panel" x="344" y="72" width="140" height="76" rx="18" stroke-width="1.5"/>
    <line class="divider" x1="436" y1="72" x2="436" y2="148" stroke-width="1.5"/>
    <text class="muted" x="390" y="95" text-anchor="middle">data</text>
    <text class="muted" x="460" y="95" text-anchor="middle">next</text>
    <text class="value" x="390" y="125" text-anchor="middle">C</text>
    <circle class="pointer" cx="460" cy="110" r="7"/>
  </g>

  <line class="line" x1="467" y1="110" x2="516" y2="110"/>
  <path d="M516 110L506 104V116L516 110Z" fill="#94A3B8"/>

  <g>
    <rect class="panel" x="528" y="72" width="140" height="76" rx="18" stroke-width="1.5"/>
    <line class="divider" x1="620" y1="72" x2="620" y2="148" stroke-width="1.5"/>
    <text class="muted" x="574" y="95" text-anchor="middle">data</text>
    <text class="muted" x="644" y="95" text-anchor="middle">next</text>
    <text class="value" x="574" y="125" text-anchor="middle">D</text>
    <circle class="pointer" cx="644" cy="110" r="7"/>
  </g>

  <line class="line" x1="651" y1="110" x2="700" y2="110"/>
  <path d="M700 110L690 104V116L700 110Z" fill="#94A3B8"/>

  <g>
    <rect class="panel" x="712" y="72" width="140" height="76" rx="18" stroke-width="1.5"/>
    <line class="divider" x1="804" y1="72" x2="804" y2="148" stroke-width="1.5"/>
    <text class="muted" x="758" y="95" text-anchor="middle">data</text>
    <text class="muted" x="828" y="95" text-anchor="middle">next</text>
    <text class="value" x="758" y="125" text-anchor="middle">E</text>
    <circle class="pointer" cx="828" cy="110" r="7"/>
  </g>

  <line class="line" x1="835" y1="110" x2="876" y2="110"/>
  <path d="M876 110L866 104V116L876 110Z" fill="#94A3B8"/>
  <rect class="danger" x="886" y="92" width="52" height="36" rx="18" stroke-width="1.5"/>
  <text class="danger-text" x="912" y="114" text-anchor="middle">null</text>

  <text class="chip-text" x="100" y="180" text-anchor="middle" dominant-baseline="middle">节点组成</text>
  <rect class="panel" x="180" y="164" width="88" height="32" rx="16" stroke-width="1.2"/>
  <text class="chip-text" x="224" y="180" text-anchor="middle" dominant-baseline="middle">数据域</text>
  <circle class="legend-dot" cx="304" cy="180" r="6"/>
  <text class="chip-text" x="328" y="180" dominant-baseline="middle">next 指针</text>
</svg>
