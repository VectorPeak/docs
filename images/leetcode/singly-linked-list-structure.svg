<svg width="960" height="240" viewBox="0 0 960 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">单链表结构示意图</title>
  <desc id="desc">从 head 开始，节点 A、C、D、E 通过 next 指针依次连接，最后指向 null。</desc>
  <rect width="960" height="240" rx="24" fill="#F8FAFC"/>
  <text x="44" y="54" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">单链表结构示意</text>
  <text x="44" y="138" fill="#334155" font-family="Arial, sans-serif" font-size="24" font-weight="600">head</text>
  <line x1="92" y1="130" x2="140" y2="130" stroke="#94A3B8" stroke-width="3"/>
  <path d="M140 130L130 124V136L140 130Z" fill="#94A3B8"/>
  <g>
    <rect x="160" y="90" width="132" height="80" rx="16" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="252" y1="90" x2="252" y2="170" stroke="#E2E8F0" stroke-width="2"/>
    <text x="194" y="138" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="600">A</text>
    <circle cx="272" cy="130" r="8" fill="#64748B"/>
  </g>
  <line x1="280" y1="130" x2="332" y2="130" stroke="#94A3B8" stroke-width="3"/>
  <path d="M332 130L322 124V136L332 130Z" fill="#94A3B8"/>
  <g>
    <rect x="340" y="90" width="132" height="80" rx="16" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="432" y1="90" x2="432" y2="170" stroke="#E2E8F0" stroke-width="2"/>
    <text x="374" y="138" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="600">C</text>
    <circle cx="452" cy="130" r="8" fill="#64748B"/>
  </g>
  <line x1="460" y1="130" x2="512" y2="130" stroke="#94A3B8" stroke-width="3"/>
  <path d="M512 130L502 124V136L512 130Z" fill="#94A3B8"/>
  <g>
    <rect x="520" y="90" width="132" height="80" rx="16" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="612" y1="90" x2="612" y2="170" stroke="#E2E8F0" stroke-width="2"/>
    <text x="554" y="138" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="600">D</text>
    <circle cx="632" cy="130" r="8" fill="#64748B"/>
  </g>
  <line x1="640" y1="130" x2="692" y2="130" stroke="#94A3B8" stroke-width="3"/>
  <path d="M692 130L682 124V136L692 130Z" fill="#94A3B8"/>
  <g>
    <rect x="700" y="90" width="132" height="80" rx="16" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="792" y1="90" x2="792" y2="170" stroke="#E2E8F0" stroke-width="2"/>
    <text x="734" y="138" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="600">E</text>
    <circle cx="812" cy="130" r="8" fill="#64748B"/>
  </g>
  <line x1="820" y1="130" x2="872" y2="130" stroke="#94A3B8" stroke-width="3"/>
  <path d="M872 130L862 124V136L872 130Z" fill="#94A3B8"/>
  <text x="886" y="138" fill="#DC2626" font-family="Arial, sans-serif" font-size="24" font-weight="700">null</text>
  <g>
    <rect x="160" y="188" width="18" height="18" rx="4" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="188" y="202" fill="#475569" font-family="Arial, sans-serif" font-size="18">数据域</text>
    <circle cx="286" cy="197" r="6" fill="#64748B"/>
    <text x="300" y="202" fill="#475569" font-family="Arial, sans-serif" font-size="18">next 指针</text>
  </g>
</svg>
